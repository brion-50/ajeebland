<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Ajeeb Mechanism · Kinetic Acrylic Sculpture</title>
<style>
  :root{
    --paper:#f7f5f1; --ink:#1a1a1a; --hair:#d8d4cc;
    --orange:#ff6e00; --purple:#551caa; --green:#6a8000; --pink:#ff00aa; --red:#ff1a1a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--paper)}
  body{font-family:Georgia,'Times New Roman',serif;color:var(--ink)}
  #stage{position:fixed;inset:0;cursor:grab}
  #stage.dragging{cursor:grabbing}

  /* museum placard */
  #placard{
    position:fixed;left:18px;bottom:18px;z-index:5;
    background:rgba(247,245,241,.92);backdrop-filter:blur(6px);
    border:1px solid var(--hair);padding:14px 16px 12px;max-width:270px;
    box-shadow:0 1px 0 #fff inset, 0 6px 24px rgba(26,26,26,.08);
  }
  #placard h1{font-size:13px;font-weight:normal;letter-spacing:.14em;text-transform:uppercase}
  #placard .sub{font-size:11px;color:#6b6659;margin-top:2px;font-style:italic}
  #placard hr{border:0;border-top:1px solid var(--hair);margin:10px 0 8px}
  .legend{font-size:11px;line-height:1.75;letter-spacing:.02em}
  .legend .row{display:flex;align-items:baseline;gap:8px}
  .legend .chip{width:9px;height:9px;border-radius:50%;flex:0 0 auto;transform:translateY(1px)}
  .legend .ratio{margin-left:auto;font-variant-numeric:tabular-nums;color:#6b6659}
  #controls{display:flex;gap:6px;align-items:center;margin-top:10px}
  #controls button{
    font:11px Georgia,serif;letter-spacing:.08em;text-transform:uppercase;
    background:none;border:1px solid var(--hair);color:var(--ink);
    padding:4px 9px;cursor:pointer
  }
  #controls button:hover{border-color:var(--ink)}
  #controls button[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  #speedwrap{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:10.5px;color:#6b6659}
  #speed{flex:1;accent-color:var(--ink);height:2px}
  #speedval{font-variant-numeric:tabular-nums;min-width:34px;text-align:right}
  #hint{position:fixed;right:18px;bottom:18px;z-index:5;font-size:10.5px;color:#8a8577;
    letter-spacing:.06em;font-style:italic;pointer-events:none;text-align:right;line-height:1.6}
  #views{position:fixed;right:18px;top:18px;z-index:5;display:flex;gap:6px}
  #views button{font:10.5px Georgia,serif;letter-spacing:.1em;text-transform:uppercase;
    background:rgba(247,245,241,.92);border:1px solid var(--hair);padding:5px 10px;cursor:pointer;color:var(--ink)}
  #views button:hover{border-color:var(--ink)}
  @media (max-width:640px){
    #placard{max-width:220px;padding:10px 12px}
    #hint{display:none}
  }
</style>
</head>

<div id="stage"></div>

<div id="views">

</div>

  </div>
  <div id="controls">
    <button id="pause" aria-pressed="false">Pause</button>

  </div>
</div>

<script type="module">
import * as THREE from 'three';

/* ================================================================
   CELESTIAL GEARWORKS
   Geometry, tooth counts and mesh graph extracted from the original
   plotter drawing. Module m = 4.2497 SVG units for every wheel, so
   every mesh is kinematically exact: w_b = -w_a * Ta/Tb.
   ================================================================ */

const W = 890.79, H = 1116.14;
const DEPTH = W / 3;                       // brief: depth = 1/3 of width
const PANEL_T = 9;                         // acrylic panel thickness
const GEAR_T = 14;                         // gear plate thickness
const SLOT_PITCH = 34;                     // z distance between gear planes
const MODULE = 4.2497;
const SUN_PERIOD = 45;                     // seconds per sun revolution at 1x

const toX = x => x - W / 2;
const toY = y => H / 2 - y;                // SVG y-down -> world y-up
// NOTE: any angle measured in SVG coords maps to -angle in world coords.

/* ---------------- wheel table (from the SVG) ------------------- */
/* slot: 0 = frontmost gear plane ... 3 = rearmost (solved so that   */
/* meshing wheels share a plane and overlapping wheels never do).    */
const WHEELS = {
  sun15:    { c:[396.153,611.189], T:15, color:'#6a3200', slot:null }, // tall pinion, spans all slots
  purple60: { c:[241.811,565.128], T:60, color:'#551caa', slot:0, rim:[113.39,2.83], hubs:[['#ff0000',27]] },
  orange45: { c:[456.207,499.933], T:45, color:'#ff6f00', slot:2, hubs:[['#000000',27]] },
  orange15a:{ c:[456.207,499.933], T:15, color:'#ff6200', slot:1 },
  orange60: { c:[337.394,396.322], T:60, color:'#ff5000', slot:1, hubs:[['#000000',27]] },

  olive14:  { c:[522.940,618.623], T:14, color:'#6a8000', slot:0 },
  green66:  { c:[668.116,528.778], T:66, color:'#6a8000', slot:0, rim:[126.00,2.83], hubs:[['#000000',27],['#ff0000',27.6]] },

  red20:    { c:[336.622,712.686], T:20, color:'#ff0000', slot:1 },

};
const MESHES = [ ['sun15','purple60'],['sun15','orange45'],['sun15','olive45'],
  ['sun15','red40'],['sun15','pink45'],
  ['orange15a','orange60'],['orange15b','orange65'],['olive14','green66'],
  ['red20','red45'],['pink30','pink50'] ];
const WELDS  = [ ['orange45','orange15a'],['orange60','orange15b'],
  ['olive45','olive14'],['red40','red20'],['pink45','pink30'] ];

/* -------- kinematics: speeds + tooth phases (verified exact) ---- */
const omega = { sun15: 1 }, phase = { sun15: 0 };
function solveTrain(){
  for (let pass = 0; pass < 4; pass++){
    for (const [a,b] of MESHES){
      if (a in omega && !(b in omega)){
        const [ax,ay] = WHEELS[a].c, [bx,by] = WHEELS[b].c;
        const psi = Math.atan2(by - ay, bx - ax);
        const Ta = WHEELS[a].T, Tb = WHEELS[b].T;
        omega[b] = -omega[a] * Ta / Tb;
        // tooth of a at angle psi  <->  gap of b at angle psi+PI

    }
    for (const [a,b] of WELDS){
      if (a in omega && !(b in omega)){ omega[b] = omega[a]; phase[b] = phase[a]; }
    }
  }
}
solveTrain();

/* ---------------- gear tooth profile ---------------------------- */
function gearShape(T, holeR){
  const m = MODULE, rp = T*m/2, ra = rp + m, rf = rp - 1.25*m;
  const sh = new THREE.Shape();
  const per = 14;                            // samples per tooth
  const N = T * per;
  const sm = t => { t = Math.min(1, Math.max(0, t)); return t*t*t*(t*(t*6-15)+10); };
  for (let i = 0; i <= N; i++){
    const th = (i / N) * Math.PI * 2;        // tooth center at angle 0
    const u = (th * T / (2*Math.PI)) % 1;
    const d = Math.abs(u - Math.round(u));   // 0 at tooth center, .5 at gap center
    let f;
    if (d < 0.16) f = 1;
    else if (d > 0.34) f = 0;
    else f = sm((0.34 - d) / 0.18);
    const r = rf + (ra - rf) * f;
    const x = r * Math.cos(th), y = r * Math.sin(th);
    if (i === 0) sh.moveTo(x, y); else sh.lineTo(x, y);
  }
  const hole = new THREE.Path();
  hole.absarc(0, 0, holeR, 0, Math.PI*2, true);
  sh.holes.push(hole);
  return sh;
}
function toothRadiusAt(T, th){               // same profile, for texture painting
  const m = MODULE, rp = T*m/2, ra = rp + m, rf = rp - 1.25*m;
  const sm = t => { t = Math.min(1, Math.max(0, t)); return t*t*t*(t*(t*6-15)+10); };
  const u = (th * T / (2*Math.PI)) % 1;
  const d = Math.abs(u - Math.round(u));
  let f; if (d < 0.16) f = 1; else if (d > 0.34) f = 0; else f = sm((0.34-d)/0.18);
  return rf + (ra - rf) * f;
}

/* ---------------- textures -------------------------------------- */
const PAPER = '#f9f7f2';
const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();
const pow2 = n => Math.pow(2, Math.ceil(Math.log2(n)));
/* finish a canvas texture so the rasterised vectors stay smooth at
   any zoom / oblique angle: sRGB, trilinear mipmaps, full anisotropy. */
function finishTex(cv){
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = MAX_ANISO;
  tex.generateMipmaps = true;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.needsUpdate = true;
  return tex;
}
function gearFaceTexture(name){
  const w = WHEELS[name];
  const ra = w.T * MODULE / 2 + MODULE;
  const R = ra + 4, k = 3, S = Math.ceil(2 * R * k);
  const cv = document.createElement('canvas'); cv.width = cv.height = S;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = PAPER; ctx.fillRect(0, 0, S, S);
  ctx.translate(S/2, S/2); ctx.scale(k, k);
  // tooth silhouette outline in the wheel's ink
  ctx.beginPath();
  const N = w.T * 26;
  for (let i = 0; i <= N; i++){
    const th = i / N * Math.PI * 2;
    const r = toothRadiusAt(w.T, th) - 0.55;
    const x = r * Math.cos(th), y = r * Math.sin(th);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = w.color; ctx.lineWidth = 0.9; ctx.stroke();
  // heavy signature rim
  if (w.rim){
    ctx.beginPath(); ctx.arc(0, 0, w.rim[0], 0, Math.PI*2);
    ctx.lineWidth = w.rim[1]; ctx.stroke();
  }
  // hub rings
  for (const [col, r] of (w.hubs || [])){
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.strokeStyle = col; ctx.lineWidth = 0.45; ctx.stroke();
  }
  // sun pinion carries its blue + red hub rings on its own face
  if (name === 'sun15'){
    for (const [col, r] of [['#0000ff',26.93],['#ff0000',31.61],['#ff0000',35.86]]){
      ctx.beginPath(); ctx.arc(0, 0, Math.min(r, R-1), 0, Math.PI*2);
      ctx.strokeStyle = col; ctx.lineWidth = 0.45; ctx.stroke();
    }
  }
  // shaft ring
  ctx.beginPath(); ctx.arc(0, 0, 8.18, 0, Math.PI*2);
  ctx.strokeStyle = w.color; ctx.lineWidth = 0.7; ctx.stroke();
  const tex = finishTex(cv);
  return { tex, R };
}

/* dial faces: everything static — ticks, numerals, dhatus, moons,
   scribbles, fine circles. Context is pre-translated so painters
   work directly in raw SVG document coordinates.                  */
function ring(ctx, col, wpx, x, y, r){
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.strokeStyle = col; ctx.lineWidth = wpx; ctx.stroke();
}
function ticks(ctx, axle){
  for (const L of DATA.ticks){
    if (L[6] !== axle) continue;
    ctx.beginPath(); ctx.moveTo(L[0], L[1]); ctx.lineTo(L[2], L[3]);
    ctx.strokeStyle = L[4]; ctx.lineWidth = L[5] || .6; ctx.stroke();
  }
}
function texts(ctx, sel){
  for (const t of DATA.texts){
    if (!sel(t)) continue;
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.rot * Math.PI / 180);
    ctx.fillStyle = t.fill;
    ctx.font = (t.bold ? '700 ' : '') + t.size + 'px ' +
      (t.bold ? "'Nirmala UI','Noto Sans Bengali',sans-serif"
              : "Copperplate,'Adorn Copperplate',Georgia,serif");
    ctx.fillText(t.s, 0, 0);
    ctx.restore();
  }
}
const DIALS = {
  orange65:{ R:114, paint(ctx, c){
      ring(ctx,'#ff6e00',.6, c[0], c[1], 97.62);
      ticks(ctx,'orange65');
      texts(ctx, t => t.fill === '#ff6e00');
    }},
  purple60:{ R:112, paint(ctx, c){
      ring(ctx,'#551caa',.6, c[0], c[1], 75.55);
      ticks(ctx,'purple');
      for (const [x,y] of DATA.moonRings) ring(ctx,'#551caa',.6, x, y, 8.18);
      ring(ctx,'#1a1a1a',.6, DATA.newMoon[0], DATA.newMoon[1], 8.18);
      ctx.fillStyle = '#551caa';
      for (const mn of DATA.moons) ctx.fill(new Path2D(mn.d));
    }},
  green66:{ R:120, paint(ctx, c){
      ring(ctx,'#6a8000',.6, c[0], c[1], 86.94);
      ticks(ctx,'green');
      texts(ctx, t => t.fill === '#6a8000');
    }},
  red45:{ R:78, paint(ctx, c){
      ring(ctx,'#ff1a1a',.6, c[0], c[1], 46.46);
      ctx.strokeStyle = '#ff1a1a'; ctx.lineWidth = .8;
      for (const d of DATA.scribbles) ctx.stroke(new Path2D(d));
    }},
  pink50:{ R:84, paint(ctx, c){
      ring(ctx,'#ff00c6',.6, c[0], c[1], 71.21);
      ticks(ctx,'pink50');
      ring(ctx,'#ff00c6',.6, c[0], c[1], 3.68);
    }},
  orange60:{ R:106, paint(ctx){ ticks(ctx,'orange60'); }},
  olive45:{ R:94,  paint(ctx){ ticks(ctx,'olive45'); }},
};
function dialTexture(name){
  const cfg = DIALS[name], w = WHEELS[name];
  // Raster the vectors at a generous texel density so fine ticks /
  // numerals / moons stay crisp, snapped to a power of two and capped
  // so texture memory stays sane on phones. Max-anisotropy filtering in
  // finishTex() keeps them smooth at the oblique three-quarter angle —
  // that filtering, more than raw size, is what removes the softness.
  const S = Math.min(Q.dialCap, pow2(cfg.R * 2 * Q.dialDensity));
  const k = S / (cfg.R * 2);
  const cv = document.createElement('canvas'); cv.width = cv.height = S;
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.translate(S/2, S/2); ctx.scale(k, k);
  ctx.translate(-w.c[0], -w.c[1]);          // now painting in SVG doc coords
  // paint each dial's labels in its cycle colour. ticks & rings are lines;
  // the numerals / glyphs are fill only — no stroke on the text labels.
  {
    const YELLOW='#e8b100', BLUE='#2563eb', GREEN='#6a8000', RED='#ff1a1a', PINK='#ff00aa';
    const LABEL_COLOR = { orange65:YELLOW, orange60:YELLOW, purple60:BLUE,
                          green66:GREEN, olive45:GREEN, red45:RED, pink50:PINK };
    const COL = LABEL_COLOR[name] || '#8b8b87';
    ['stroke','fill','fillText'].forEach(fn => {
      if (typeof ctx[fn] !== 'function') return;
      const orig = ctx[fn].bind(ctx);
      ctx[fn] = (...args) => { ctx.strokeStyle = COL; ctx.fillStyle = COL; return orig(...args); };
    });
  }
  cfg.paint(ctx, w.c);
  return { tex: finishTex(cv), R: cfg.R };
}

/* ---------------- mini SVG path -> THREE.Shape ------------------ */
/* Handles M m L l H h V v C c S s Z z with repeated groups (all    */
/* that the hand drawings use). Y is negated: SVG y-down -> y-up.   */
function pathToShapes(d){
  const tokens = d.match(/[MmLlHhVvCcSsZz]|-?\d*\.?\d+(?:e-?\d+)?/g);
  const sp = new THREE.ShapePath();
  let i = 0, cmd = '', x = 0, y = 0, sx = 0, sy = 0, pcx = null, pcy = null, guard = -1;
  const num = () => parseFloat(tokens[i++]);
  const isNum = () => i < tokens.length && !/[A-Za-z]/.test(tokens[i]);
  while (i < tokens.length){
    if (/[A-Za-z]/.test(tokens[i])) cmd = tokens[i++];
    switch (cmd){
      case 'M': case 'm': {
        const rel = cmd === 'm';
        x = (rel ? x : 0) + num(); y = (rel ? y : 0) + num();
        sx = x; sy = y; sp.moveTo(x, -y); pcx = pcy = null;
        cmd = rel ? 'l' : 'L'; break;
      }
      case 'L': case 'l': {
        const rel = cmd === 'l';
        x = (rel ? x : 0) + num(); y = (rel ? y : 0) + num();
        sp.lineTo(x, -y); pcx = pcy = null; break;
      }
      case 'H': case 'h': x = (cmd === 'h' ? x : 0) + num(); sp.lineTo(x, -y); pcx = pcy = null; break;
      case 'V': case 'v': y = (cmd === 'v' ? y : 0) + num(); sp.lineTo(x, -y); pcx = pcy = null; break;
      case 'C': case 'c': {
        const rel = cmd === 'c';
        const x1 = (rel ? x : 0) + num(), y1 = (rel ? y : 0) + num();
        const x2 = (rel ? x : 0) + num(), y2 = (rel ? y : 0) + num();
        const nx = (rel ? x : 0) + num(), ny = (rel ? y : 0) + num();
        sp.bezierCurveTo(x1, -y1, x2, -y2, nx, -ny);
        pcx = x2; pcy = y2; x = nx; y = ny; break;
      }
      case 'S': case 's': {
        const rel = cmd === 's';
        const x1 = pcx === null ? x : 2 * x - pcx;
        const y1 = pcy === null ? y : 2 * y - pcy;
        const x2 = (rel ? x : 0) + num(), y2 = (rel ? y : 0) + num();
        const nx = (rel ? x : 0) + num(), ny = (rel ? y : 0) + num();
        sp.bezierCurveTo(x1, -y1, x2, -y2, nx, -ny);
        pcx = x2; pcy = y2; x = nx; y = ny; break;
      }
      case 'Z': case 'z':
        if (sp.currentPath) sp.currentPath.closePath();
        x = sx; y = sy; pcx = pcy = null; break;
    }
    if (i === guard){ i++; } guard = i;
  }
  let shapes = sp.toShapes(true);
  const holeCount = shapes.reduce((n,s)=>n+s.holes.length,0);
  if (!shapes.length || (d.split(/[Mm]/).length > 2 && holeCount === 0))
    shapes = sp.toShapes(false);
  return shapes;
}

/* ---------------- z layout -------------------------------------- */
const EXPLODE_K = 2.35;
let explode = 0, explodeTarget = 0;                     // 0..1
const slotZ = (s, e) => (51 - s * SLOT_PITCH) * (1 + (EXPLODE_K - 1) * e);
const zPlaced = [];                                     // objects with {obj, zAt(e)}
function placeZ(obj, zAt){ zPlaced.push({ obj, zAt }); obj.position.z = zAt(0); }

/* ---------------- build the sculpture --------------------------- */
const sculpture = new THREE.Group();
scene.add(sculpture);

/* Hollow acrylic vitrine: instead of two solid glass faces (which were
   both the perf cost and what washed out the image), the enclosure is
   drawn as its 12 glossy edge bars — a front rectangle, a back
   rectangle and four depth rails. Tiny surface area, so it's cheap and
   the gears + dials behind it stay perfectly crisp. */
const acrylicEdge = new THREE.MeshPhysicalMaterial({
  color:'#eaf1f4', roughness:.07, metalness:0, transparent:true, opacity:.42,
  ior:1.49, specularIntensity:1, clearcoat:1, clearcoatRoughness:.08,
  envMapIntensity:1.25, depthWrite:false });
{
  const hw = W/2, hh = H/2, hd = DEPTH/2, SEC = 7;
  const bar = (w,h,d,x,y,z) => {
    const g = new THREE.BoxGeometry(w,h,d);
    const m = new THREE.Mesh(g, acrylicEdge);
    m.position.set(x,y,z); m.renderOrder = 2; sculpture.add(m);
  };
  for (const y of [-hh,hh]) for (const z of [-hd,hd]) bar(W+SEC, SEC, SEC, 0, y, z);   // width edges
  for (const x of [-hw,hw]) for (const z of [-hd,hd]) bar(SEC, H+SEC, SEC, x, 0, z);   // height edges
  for (const x of [-hw,hw]) for (const y of [-hh,hh]) bar(SEC, SEC, DEPTH, x, y, 0);   // depth rails
}

/* corner standoffs — the four r=9 circles in the drawing */
const chrome = new THREE.MeshPhysicalMaterial({ color:'#d9d7d2', metalness:.95, roughness:.22 });
const boltPos = [[54.28,54.37],[837.03,54.29],[54.41,1062.38],[837.16,1062.48]];
{

  const cap = new THREE.CylinderGeometry(9, 9, 4, 24); cap.rotateX(Math.PI/2);

    const c1 = new THREE.Mesh(cap, chrome); c1.position.set(x, y,  DEPTH/2 + 2);
    const c2 = new THREE.Mesh(cap, chrome); c2.position.set(x, y, -DEPTH/2 - 2);
    sculpture.add(r, c1, c2);

/* embossed star dots on the FRONT face of the front panel */
{
  const geo = new THREE.CylinderGeometry(1, 1, 2.4, Q.starSeg); geo.rotateX(Math.PI/2);
  const mat = new THREE.MeshStandardMaterial({ roughness:.55, metalness:0 });
  const inst = new THREE.InstancedMesh(geo, mat, DATA.stars.length);
  const M = new THREE.Matrix4(), col = new THREE.Color();
  DATA.stars.forEach((s, idx) => {
    M.makeScale(s[2], s[2], 1);
    M.setPosition(toX(s[0]), toY(s[1]), DEPTH/2 + 1.2);
    inst.setMatrixAt(idx, M);
    inst.setColorAt(idx, col.set(s[3]));
  });
  inst.instanceColor.needsUpdate = true;
  sculpture.add(inst);
}

/* wheels */
const spinning = [];    // { group, name }  rotation.z = -(phase + omega * sunAngle)
const axleDone = new Set();
const SUN_SPAN = [3, 0];                       // rearmost..frontmost slots the sun reaches
for (const [name, w] of Object.entries(WHEELS)){
  const isSun = name === 'sun15';
  const holeR = 8.18;
  const shape = gearShape(w.T, holeR);
  const depth = isSun ? (slotZ(SUN_SPAN[1],0) - slotZ(SUN_SPAN[0],0)) + GEAR_T + 8 : GEAR_T;
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth, bevelEnabled: Q.bevel && !isSun, bevelThickness:.9, bevelSize:.8, bevelSegments:2, curveSegments:4
  });
  geo.translate(0, 0, -depth/2);
  // remap cap UVs into the face texture square
  const { tex, R } = gearFaceTexture(name);
  const uv = geo.attributes.uv, pos = geo.attributes.position;
  for (let i = 0; i < uv.count; i++){
    uv.setXY(i, pos.getX(i)/(2*R) + .5, pos.getY(i)/(2*R) + .5);
  }
  const faceMat = new THREE.MeshPhysicalMaterial({
    map:tex, roughness:.42, clearcoat:.35*Q.clearcoat, clearcoatRoughness:.3, envMapIntensity:.55 });
  const edgeMat = new THREE.MeshPhysicalMaterial({
    color:w.color, roughness:.3, clearcoat:.5*Q.clearcoat, clearcoatRoughness:.2, envMapIntensity:.7 });
  const mesh = new THREE.Mesh(geo, [faceMat, edgeMat]);
  const group = new THREE.Group();
  group.add(mesh);
  group.position.set(toX(w.c[0]), toY(w.c[1]), 0);
  if (isSun){
    placeZ(group, e => (slotZ(SUN_SPAN[0], e) + slotZ(SUN_SPAN[1], e)) / 2);
    group.userData.rebuild = null;
    // stretch the tall pinion when layers spread apart
    zPlaced.push({ obj: mesh, zAt: null, scaleZ: e => {
      const target = (slotZ(SUN_SPAN[1], e) - slotZ(SUN_SPAN[0], e)) + GEAR_T + 8;
      return target / depth;
    }});
  } else {
    placeZ(group, e => slotZ(w.slot, e));
  }
  sculpture.add(group);
  spinning.push({ group, name });

  /* chrome axle rod, one per axle */
  const axleKey = w.c.join(',');
  if (!axleDone.has(axleKey)){
    axleDone.add(axleKey);
    const rod = new THREE.CylinderGeometry(5.2, 5.2, DEPTH - PANEL_T*2 - 2, 18);
    rod.rotateX(Math.PI/2);
    const r = new THREE.Mesh(rod, chrome);
    r.position.set(toX(w.c[0]), toY(w.c[1]), 0);
    sculpture.add(r);
  }
}

/* static dials + pointers, assembled proud of the FRONT panel's outer
   face — fixed there regardless of the gear-layer explode, exactly as
   a real instrument cluster would be bolted on top of the acrylic.  */
const FRONT_FACE_Z = DEPTH/2;          // outer surface of the front panel
const POINTER_Z = FRONT_FACE_Z + 3;    // pointer hovers just above the panel
const DIAL_Z    = FRONT_FACE_Z + 7;    // dial face sits slightly higher (further out)

for (const name of Object.keys(DIALS)){
  const w = WHEELS[name];
  const { tex, R } = dialTexture(name);
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(R*2, R*2),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, depthWrite:false, side:THREE.DoubleSide }));
  plane.position.set(toX(w.c[0]), toY(w.c[1]), DIAL_Z);
  sculpture.add(plane);
}

/* dial pointers — rigidly keyed to their wheel, coloured to match it */
const POINTER_START = { orange65:-90, purple60:0, pink50:210, green66:-68, red45:140 }; // deg, SVG sense
for (const p of DATA.pointers){
  const shapes = pathToShapes(p.d);
  const geo = new THREE.ExtrudeGeometry(shapes, {
    depth:3, bevelEnabled:true, bevelThickness:.45, bevelSize:.45, bevelSegments:1, curveSegments:5 });
  geo.translate(-p.pivot[0], p.pivot[1], 0);    // pivot at origin (y already negated in shapes)
  const w = WHEELS[p.gear];
  const mat = new THREE.MeshPhysicalMaterial({
    color:w.color, roughness:.32, clearcoat:.6*Q.clearcoat, clearcoatRoughness:.2, envMapIntensity:.65 });
  const mesh = new THREE.Mesh(geo, mat);
  const group = new THREE.Group();
  group.add(mesh);
  group.position.set(toX(w.c[0]), toY(w.c[1]), POINTER_Z);
  sculpture.add(group);
  spinning.push({ group, name:p.gear, extra:POINTER_START[p.gear] * Math.PI/180 - phase[p.gear] });
}

/* ---------------- edge-outline-only rendering -------------------- */
/* Show only the model's edge outlines in thin grey lines — no surface
   / triangle wireframe, no textures, no colour. Geometry, motion and
   layout stay untouched: each edge set is parented to its mesh so it
   inherits all animation, and the original coloured surface is hidden.
   Feature edges only (coplanar surface lines are excluded). */
{
  const EDGE_COLOR = 0x8b8b87;          // grey
  const THRESH = 30;                     // deg: keep only outline/feature edges
  const edgeMatFor = () => new THREE.LineBasicMaterial({ color: EDGE_COLOR, transparent: true, opacity: 0.8 });
  const hide = obj => {
    if (Array.isArray(obj.material)) obj.material.forEach(m => { if (m) m.visible = false; });
    else if (obj.material) obj.material.visible = false;
  };
  // a smooth cylinder has no lengthwise feature edges, so EdgesGeometry would
  // leave only two tiny end rings (the rods "vanish"). Draw a proper tube
  // wireframe instead: both rim circles + a few longitudinal rails.
  const cylinderWire = geom => {
    const p = geom.parameters || {};
    const r = ((p.radiusTop !== undefined ? p.radiusTop : 5) + (p.radiusBottom !== undefined ? p.radiusBottom : 5)) / 2;
    const h = p.height !== undefined ? p.height : 1;
    const N = 28, LNG = 8, z0 = -h/2, z1 = h/2, pos = [];
    for (const z of [z0, z1]){
      for (let i = 0; i < N; i++){
        const a0 = i/N*Math.PI*2, a1 = (i+1)/N*Math.PI*2;
        pos.push(Math.cos(a0)*r, Math.sin(a0)*r, z, Math.cos(a1)*r, Math.sin(a1)*r, z);
      }
    }
    for (let j = 0; j < LNG; j++){
      const a = j/LNG*Math.PI*2, cx = Math.cos(a)*r, cy = Math.sin(a)*r;
      pos.push(cx, cy, z0, cx, cy, z1);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    return g;
  };

  const meshes = [];
  sculpture.traverse(obj => { if (obj.isMesh && !obj.isInstancedMesh) meshes.push(obj); });
  for (const mesh of meshes){
    const type = mesh.geometry && mesh.geometry.type;
    if (type === 'PlaneGeometry') continue;          // dial faces: keep the grey label art
    const lineGeo = (type === 'CylinderGeometry')
      ? cylinderWire(mesh.geometry)                  // rods / caps -> tube wireframe
      : new THREE.EdgesGeometry(mesh.geometry, THRESH);
    const line = new THREE.LineSegments(lineGeo, edgeMatFor());
    line.renderOrder = 3;
    mesh.add(line);        // inherits the mesh's (animated) transform
    hide(mesh);            // hide the coloured surface, keep transform + child
  }

  // instanced star dots -> thin grey circle outlines (edges only, no colour)
  sculpture.traverse(obj => {
    if (obj.isInstancedMesh){
      const N = 12, ring = [];
      for (let i = 0; i < N; i++){
        const a0 = i / N * Math.PI * 2, a1 = (i + 1) / N * Math.PI * 2;
        ring.push(Math.cos(a0), Math.sin(a0), 0, Math.cos(a1), Math.sin(a1), 0);
      }
      const M = new THREE.Matrix4(), v = new THREE.Vector3(), out = [];
      for (let idx = 0; idx < obj.count; idx++){
        obj.getMatrixAt(idx, M);
        for (let k = 0; k < ring.length; k += 3){
          v.set(ring[k], ring[k+1], ring[k+2]).applyMatrix4(M);
          out.push(v.x, v.y, v.z);
        }
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.Float32BufferAttribute(out, 3));
      const stars = new THREE.LineSegments(g, edgeMatFor());
      stars.renderOrder = 3;
      obj.parent.add(stars);
      obj.visible = false;
    }
  });
}

/* ---------------- camera + custom orbit ------------------------- */
const target = new THREE.Vector3(0, 0, 0);
let theta = 0.42, phi = 1.32, dist = 1750;      // three-quarter opening view
const VIEWS = {
  front:{ t:0.0,  p:Math.PI/2, d:1620 },
  three:{ t:0.42, p:1.32,      d:1750 },
  side: { t:1.25, p:1.45,      d:1500 },
};
let vTheta = theta, vPhi = phi, vDist = dist;
function applyCamera(){
  camera.position.set(
    target.x + dist * Math.sin(phi) * Math.sin(theta),
    target.y + dist * Math.cos(phi),
    target.z + dist * Math.sin(phi) * Math.cos(theta));
  camera.lookAt(target);
}
let dragging = false, px = 0, py = 0, pinchD = 0;
stage.addEventListener('pointerdown', e => {
  dragging = true; px = e.clientX; py = e.clientY;
  stage.classList.add('dragging'); stage.setPointerCapture(e.pointerId);
});
addEventListener('pointermove', e => {
  if (!dragging) return;
  vTheta -= (e.clientX - px) * 0.005;
  vPhi   -= (e.clientY - py) * 0.005;
  vPhi = Math.max(0.15, Math.min(Math.PI - 0.15, vPhi));
  px = e.clientX; py = e.clientY;
});
addEventListener('pointerup', () => { dragging = false; stage.classList.remove('dragging'); });
stage.addEventListener('wheel', e => {
  e.preventDefault();
  vDist = Math.max(500, Math.min(4200, vDist * (1 + Math.sign(e.deltaY) * .08)));
}, { passive:false });
stage.addEventListener('touchmove', e => {
  if (e.touches.length === 2){
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    if (pinchD) vDist = Math.max(500, Math.min(4200, vDist * pinchD / d));
    pinchD = d;
  }
}, { passive:true });
stage.addEventListener('touchend', () => pinchD = 0);

document.querySelectorAll('#views button').forEach(b => b.addEventListener('click', () => {
  const v = VIEWS[b.dataset.view];
  vTheta = v.t; vPhi = v.p; vDist = v.d;
}));

/* ---------------- UI: tempo, pause, layers ---------------------- */
const speedEl = document.getElementById('speed');
const speedVal = document.getElementById('speedval');
const pauseBtn = document.getElementById('pause');
const explodeBtn = document.getElementById('explode');
let paused = false;
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
if (reduced){ paused = true; pauseBtn.setAttribute('aria-pressed','true'); pauseBtn.textContent = 'Play'; }
const sliderToSpeed = v => v === 0 ? 0 : Math.pow(10, (v - 42) / 42);  // ~0.1x .. ~24x, 1x at 42
let speed = sliderToSpeed(+speedEl.value);
speedEl.addEventListener('input', () => {
  speed = sliderToSpeed(+speedEl.value);
  speedVal.textContent = speed === 0 ? 'still' : speed.toFixed(speed < 3 ? 1 : 0) + '×';
});
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.setAttribute('aria-pressed', paused);
  pauseBtn.textContent = paused ? 'Play' : 'Pause';
});
explodeBtn.addEventListener('click', () => {
  explodeTarget = explodeTarget ? 0 : 1;
  explodeBtn.setAttribute('aria-pressed', !!explodeTarget);
});

/* ---------------- animation ------------------------------------- */
let sunAngle = 0;                       // accumulated SVG-sense angle of the pinion
const clock = new THREE.Clock();

/* adaptive resolution: if the running average frame time stays high,
   step the pixel ratio down once. Cheap insurance for weak GPUs on
   either tier; never touches geometry so the look is preserved.     */
let avgDt = 1/60, curPR = Math.min(devicePixelRatio, Q.prCap), downshifts = 0;
function maybeDownshift(dt){
  avgDt = avgDt * 0.94 + dt * 0.06;
  if (downshifts < 2 && avgDt > 1/45 && curPR > 0.75){
    curPR = Math.max(0.75, curPR - 0.35); downshifts++;
    renderer.setPixelRatio(curPR); avgDt = 1/60;
  }
}

function frame(){
  requestAnimationFrame(frame);
  const dt = Math.min(clock.getDelta(), .1);
  if (dt > 0) maybeDownshift(dt);
  if (!paused) sunAngle += (Math.PI * 2 / SUN_PERIOD) * speed * dt;

  // spring the layer spread
  explode += (explodeTarget - explode) * Math.min(1, dt * 4);
  if (Math.abs(explodeTarget - explode) > 1e-4){
    for (const z of zPlaced){
      if (z.zAt) z.obj.position.z = z.zAt(explode);
      if (z.scaleZ) z.obj.scale.z = z.scaleZ(explode);
    }
  }

  for (const s of spinning){
    const th = phase[s.name] + omega[s.name] * sunAngle + (s.extra || 0);
    s.group.rotation.z = -th;           // SVG angle -> world angle
  }

  // eased camera
  theta += (vTheta - theta) * .12;
  phi   += (vPhi   - phi)   * .12;
  dist  += (vDist  - dist)  * .12;
  applyCamera();
  renderer.render(scene, camera);
}
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
applyCamera();
frame();
</script>
